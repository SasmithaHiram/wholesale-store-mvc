name: CICD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Detect solution and tests
        id: detect
        run: |
          SOLUTION="$(find . -maxdepth 6 -name '*.sln' | head -n 1)"
          if [ -z "$SOLUTION" ]; then
            echo "No .sln file found in repository."
            exit 1
          fi
          echo "solution=$SOLUTION" >> "$GITHUB_OUTPUT"

          TEST_COUNT="$(find . -maxdepth 8 -name '*Test*.csproj' | wc -l)"
          if [ "$TEST_COUNT" -gt 0 ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore "${{ steps.detect.outputs.solution }}"

      - name: Build
        run: dotnet build "${{ steps.detect.outputs.solution }}" --configuration Release --no-restore

      - name: Test
        if: steps.detect.outputs.has_tests == 'true'
        run: dotnet test "${{ steps.detect.outputs.solution }}" --configuration Release --no-build --verbosity normal

      - name: Skip tests (none found)
        if: steps.detect.outputs.has_tests != 'true'
        run: echo "No test projects found. Skipping test step."

      - name: Publish
        run: dotnet publish "${{ steps.detect.outputs.solution }}" --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-publish
          path: ./publish

  cd:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: app-publish
          path: ./publish

      - name: Deploy
        run: |
          echo "Replace this with your real deploy command."
          # ...existing code...
          # Example:
          # az webapp deploy --resource-group <rg> --name <app-name> --src-path ./publish
