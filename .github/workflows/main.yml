name: JavaFX CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt-in to Node.js 24

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3  # Ensure you're using the latest checkout version

      - name: Set up JDK 11
        uses: actions/setup-java@v3  # Use the latest setup-java action
        with:
          java-version: '11'
          distribution: 'adoptopenjdk'  # Specify the distribution (if needed)

      - name: Cache Maven dependencies
        uses: actions/cache@v3  # Updated to v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean install

      - name: Run tests
        run: mvn test
